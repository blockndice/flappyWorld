<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Flappy World</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='-16 -14 36 30'%3E%3Cg transform='rotate(-20)'%3E%3Crect x='-13' y='-11' width='26' height='22' fill='%23f5d600'/%3E%3Crect x='-9' y='3' width='16' height='6' fill='%23fff3a0'/%3E%3Crect x='-13' y='0' width='10' height='7' fill='%23d4a800'/%3E%3Crect x='3' y='-8' width='9' height='9' fill='%23fff'/%3E%3Crect x='7' y='-5' width='4' height='4' fill='%23111'/%3E%3Crect x='11' y='-3' width='9' height='5' fill='%23ff8800'/%3E%3Crect x='11' y='1' width='9' height='2' fill='%23cc6600'/%3E%3C/g%3E%3C/svg%3E"/>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d1a" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Flappy World" />
  <meta property="og:description" content="play · collect · earn" />
  <meta property="og:image"       content="https://blockndice.github.io/flappyWorld/asset/img/og-banner.jpg" />

  <link rel="stylesheet" href="asset/css/style.css" />
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="volWrap">
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" aria-label="Volume" />
      <div id="volIcon"></div>
    </div>
    <button id="fsBtn" aria-label="Plein écran"></button>
  </div>
  <script src="asset/js/sound.js"></script>
  <script src="asset/js/shop.js"></script>
  <script src="asset/js/game.js"></script>
</body>
</html>
