<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Flappy World</title>

  <!-- PWA : masque l'UI navigateur quand ajouté à l'écran d'accueil -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d1a" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Flappy World" />
  <meta property="og:description" content="play · collect · earn" />
  <meta property="og:image"       content="https://blockndice.github.io/flappyWorld/asset/img/og-banner.jpg" />
  <meta property="og:url"         content="https://blockndice.github.io/flappyWorld/" />
  <meta property="og:type"        content="website" />

  <link rel="stylesheet" href="asset/css/style.css" />
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="volWrap">
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1" aria-label="Volume" />
      <div id="volIcon"></div>
    </div>
    <button id="fsBtn" aria-label="Plein écran"></button>
  </div>
  <script src="asset/js/sound.js"></script>
  <script src="asset/js/shop.js"></script>
  <script src="asset/js/game.js"></script>
</body>
</html>
